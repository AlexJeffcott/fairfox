app = "fairfox-turn"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  TURN_REALM = "fairfox"
  # Constrain coturn's per-allocation relay port window to the same
  # range we forward via Fly's services config below. Each port
  # corresponds to one concurrent TURN allocation; household-scale
  # use rarely exceeds two or three at once, so 16 is generous.
  #
  # Why so narrow? Fly's `[[services]]` range syntax
  # (`start_port`/`end_port`) deploys cleanly and shows in
  # `fly machine status` but does not actually forward UDP across the
  # whole window — packets to dynamically-allocated relay ports never
  # reach the Machine. Enumerating each port as its own `[[services]]`
  # block does work. Widen by adding more blocks if needed.
  TURN_RELAY_MIN_PORT = "49152"
  TURN_RELAY_MAX_PORT = "49167"
  # Fly's dedicated app IPs from `fly ips list`. Coturn advertises
  # these as its relay endpoints; peers connect to them. Each
  # Machine's FLY_PUBLIC_IP is a per-Machine IPv6, not the
  # app-level address — pinning here keeps both Machines (or a
  # later scale-up) consistent.
  EXTERNAL_IP_V4 = "213.188.221.129"
  EXTERNAL_IP_V6 = "2a09:8280:1::114:2669:0"

# Coturn binds 3478 for both transports. UDP is the fast path WebRTC
# prefers; TCP is the fallback for networks that block UDP (some
# corporate firewalls, hotel wifi).
[[services]]
  internal_port = 3478
  protocol = "tcp"

  [[services.ports]]
    port = 3478

[[services]]
  internal_port = 3478
  protocol = "udp"

  [[services.ports]]
    port = 3478

# Dynamic relay port forwards, enumerated. Each TURN ALLOCATE returns
# a relay endpoint on one of these ports; the external port must equal
# the internal port (coturn binds the same number on both sides), so
# each port needs its own `[[services]]` block.
[[services]]
  internal_port = 49152
  protocol = "udp"
  [[services.ports]]
    port = 49152

[[services]]
  internal_port = 49153
  protocol = "udp"
  [[services.ports]]
    port = 49153

