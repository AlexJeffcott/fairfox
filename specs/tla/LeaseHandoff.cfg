\* TLC config for LeaseHandoff.tla
\*
\* Two daemons. The state space is tiny under the time-abstracted
\* model (holder x leaseLive x alive ~ a few hundred states); bumps
\* to 3 daemons stay sub-second. The protocol is mostly symmetric, so
\* 2 is enough to catch the kill-and-handoff scenario.

SPECIFICATION Spec

CONSTANTS
    Daemons = {A, B, C}

INVARIANTS
    TypeOK
    AtMostOneLiveHolder
    LiveImpliesNamed

PROPERTIES
    EventualConvergence
    EventualHolderClaimed
