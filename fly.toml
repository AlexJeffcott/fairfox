app = "fairfox"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  # Legacy SQLite store no longer used (retired with the old todo/struggle
  # sub-apps). Cleared so the env validator doesn't try to stat /data.
  DATA_DIR = ""

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
