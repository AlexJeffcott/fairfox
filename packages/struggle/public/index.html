<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Struggle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-y: auto; overflow-x: hidden; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 19px;
      line-height: 1.75;
      color: #1a1a1a;
      background: #f5f1eb;
    }

    /* Passage rendering */
    .passage { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .passage p { margin-bottom: 1.2em; }
    .inner-voice { font-style: italic; color: #3a3a3a; }
    .passage blockquote {
      margin: 1.8em 0; padding: 0 0 0 1.5em;
      border-left: 2px solid #b8a88a;
    }
    .passage blockquote p { font-style: italic; color: #4a4a4a; margin-bottom: 0.3em; }
    .equation { text-align: center; font-size: 1.6em; margin: 1.4em 0; letter-spacing: 0.1em; }
    .choices { margin-top: 2em; padding-top: 1em; }
    .choices a {
      display: block; color: #5a4a3a; text-decoration: none;
      padding: 0.6em 0; border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s; cursor: pointer;
    }
    .choices a:hover { color: #1a1a1a; border-bottom-color: #b8a88a; }
    .choices a.nav-link::before { content: '\2014\2003'; color: #b8a88a; }
    .choices a.inspect-link::before { content: '\25B8\2003'; color: #c8b898; }
    .choices a.inspect-link { color: #7a6a5a; }
    .inline-inspect, .passage a[data-inspect] {
      color: #5a4a3a; text-decoration: none;
      border-bottom: 1px dotted #c8b898; cursor: pointer;
      transition: border-color 0.2s;
    }
    .inline-inspect:hover, .passage a[data-inspect]:hover { border-bottom-color: #5a4a3a; }
    .death-text { margin-top: 3em; padding-top: 2em; border-top: 1px solid #d0c8b8; }
    .death-text p { font-style: italic; color: #6a6a6a; }
    .chapter-title {
      font-size: 0.85em; letter-spacing: 0.15em; text-transform: uppercase;
      color: #8a7a6a; margin-bottom: 3em; text-align: center;
    }
    .separator { text-align: center; color: #b8a88a; margin: 0.8em 0; font-size: 1.2em; letter-spacing: 0.5em; }
    .title-page {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 80vh; text-align: center; animation: fadeIn 0.8s ease;
    }
    .title-page h1 {
      font-size: 2.4em; font-weight: normal; letter-spacing: 0.08em;
      color: #1a1a1a; margin-bottom: 0.3em;
    }
    .title-page .subtitle {
      font-size: 0.9em; letter-spacing: 0.2em; text-transform: uppercase;
      color: #8a7a6a; margin-bottom: 3em;
    }
    .title-page a {
      color: #8a7a6a; text-decoration: none; font-size: 0.85em;
      letter-spacing: 0.15em; cursor: pointer; transition: color 0.3s;
    }
    .title-page a:hover { color: #1a1a1a; }
    .prologue-text { font-style: italic; color: #5a5a5a; }
    .prologue-text p { margin-bottom: 1.2em; }
    .back-link {
      display: inline-block; margin-top: 3em;
      color: #8a7a6a; text-decoration: none; font-size: 0.85em;
      letter-spacing: 0.1em; cursor: pointer; transition: color 0.2s;
    }
    .back-link:hover { color: #1a1a1a; }
    .back-link::before { content: '\2190\2003'; }

    /* Edit mode */
    .edit-toggle {
      position: fixed; right: 1rem; top: 1rem;
      background: none; border: 1px solid transparent;
      color: #c8b898; cursor: pointer; font-size: 0.8em;
      font-family: Georgia, 'Times New Roman', serif;
      letter-spacing: 0.08em; z-index: 5;
      padding: 0.2em 0.5em; border-radius: 3px;
      transition: color 0.2s, border-color 0.2s;
    }
    .edit-toggle:hover { color: #5a4a3a; border-color: #c8b898; }
    .edit-toggle.active { color: #5a4a3a; border-color: #b8a88a; background: #eee8dd; }
    .edit-area {
      width: 100%; min-height: 400px; padding: 1em;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.88em; line-height: 1.7;
      border: 1px solid #d0c8b8; border-radius: 3px;
      background: #faf8f4; color: #1a1a1a; resize: vertical;
      tab-size: 2;
    }
    .edit-area:focus { outline: none; border-color: #8a7a6a; }
    .edit-bar {
      display: flex; gap: 0.6em; align-items: center;
      margin-bottom: 1.2em; padding-bottom: 0.8em;
      border-bottom: 1px solid #d0c8b8;
    }
    .edit-bar .ctx-tab {
      background: none; border: 1px solid #d0c8b8;
      color: #8a7a6a; padding: 0.2em 0.6em;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.85em; cursor: pointer; border-radius: 3px;
      transition: background 0.2s, color 0.2s;
    }
    .edit-bar .ctx-tab.active { background: #5a4a3a; color: #f5f1eb; border-color: #5a4a3a; }
    .edit-bar .ctx-tab:hover:not(.active) { border-color: #8a7a6a; color: #5a4a3a; }
    .edit-actions { margin-left: auto; display: flex; gap: 0.4em; }
    .edit-actions button {
      background: none; border: 1px solid #b8a888;
      color: #5a4a3a; padding: 0.25em 0.8em;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.85em; cursor: pointer; border-radius: 3px;
      transition: background 0.2s, color 0.2s;
    }
    .edit-actions button:hover { background: #5a4a3a; color: #f5f1eb; }
    .edit-actions button.save-btn { border-color: #5a8a5a; color: #4a6a4a; }
    .edit-actions button.save-btn:hover { background: #4a6a4a; color: #f5f1eb; }
    .edit-status { font-size: 0.8em; color: #8a7a6a; font-style: italic; margin-left: 0.6em; }

    /* Layout */
    #shell { display: flex; justify-content: center; min-height: 100vh; }
    #app {
      max-width: 600px; width: 100%;
      margin: 0; padding: 4rem 1.5rem 8rem;
      flex-shrink: 0;
    }

    /* Left panel — memory palace */
    #left-panel {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 320px; max-width: 90vw;
      background: #eee8dd; border-right: 1px solid #d0c8b8;
      padding: 2rem 1.5rem; overflow-y: auto;
      transform: translateX(-100%); transition: transform 0.25s ease;
      z-index: 10; font-size: 0.88em;
    }
    #left-panel.open { transform: translateX(0); }
    #left-panel .panel-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; font-size: 1.2em;
      color: #8a7a6a; cursor: pointer; font-family: inherit;
    }
    #left-panel .panel-close:hover { color: #1a1a1a; }
    #left-panel h3 {
      margin: 0 0 0.5em; font-size: 1em; font-weight: normal;
      color: #8a7a6a; letter-spacing: 0.08em; text-transform: uppercase;
    }
    #left-panel .memory-section { margin-bottom: 2em; }
    #left-panel .memory-section ul { list-style: none; }
    #left-panel .memory-section li { padding: 0.3em 0; color: #5a4a3a; font-size: 0.95em; }
    #left-panel .memory-section li.empty { color: #b8a888; font-style: italic; }
    .memory-link {
      color: #5a4a3a; text-decoration: none; cursor: pointer;
      border-bottom: 1px solid transparent; transition: border-color 0.2s;
    }
    .memory-link:hover { border-bottom-color: #b8a88a; }
    .left-toggle {
      position: fixed; left: 1rem; top: 1rem;
      background: none; border: none;
      color: #b8a888; cursor: pointer; font-size: 1.1em;
      font-family: Georgia, 'Times New Roman', serif;
      letter-spacing: 0.08em; z-index: 5;
      transition: color 0.2s; display: none;
    }
    .left-toggle:hover { color: #5a4a3a; }

    /* Right panel */
    #right-panel {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 320px; max-width: 90vw;
      background: #eee8dd; border-left: 1px solid #d0c8b8;
      padding: 2rem 1.5rem; overflow-y: auto;
      transform: translateX(100%); transition: transform 0.25s ease;
      z-index: 10; font-size: 0.88em;
    }
    #right-panel.open { transform: translateX(0); }
    #right-panel .panel-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; font-size: 1.2em;
      color: #8a7a6a; cursor: pointer; font-family: inherit;
    }
    #right-panel .panel-close:hover { color: #1a1a1a; }

    /* Feedback form (right panel) */
    .fb-sent { color: #8a7a6a; font-style: italic; margin-top: 1em; }
  </style>
</head>
<body>
  <button class="left-toggle" id="left-toggle">&#9776;</button>
  <button class="edit-toggle" id="edit-toggle">Edit</button>
  <div id="left-panel">
    <button class="panel-close">&times;</button>
    <div id="left-panel-content"></div>
    <div style="margin-top:3em; padding-top:1em; border-top:1px solid #d0c8b8;">
      <button id="restart-btn" style="background:none; border:1px solid #c8b898; color:#8a7a6a; padding:0.3em 0.8em; font-family:Georgia,'Times New Roman',serif; font-size:0.8em; cursor:pointer; border-radius:3px;">Restart</button>
    </div>
  </div>
  <div id="shell">
    <div id="app"></div>
  </div>
  <div id="right-panel">
    <button class="panel-close">&times;</button>
    <div id="panel-content"></div>
  </div>

  <script>window.BASE_PATH = window.BASE_PATH || '';</script>
  <script type="module">
    import { effect, signal } from 'https://esm.sh/@preact/signals-core@1.8.0';

    // --- DOM refs ---
    const app = document.getElementById('app');
    const leftPanel = document.getElementById('left-panel');
    const leftPanelContent = document.getElementById('left-panel-content');
    const leftToggle = document.getElementById('left-toggle');
    const rightPanel = document.getElementById('right-panel');
    const panelContent = document.getElementById('panel-content');
    const editToggle = document.getElementById('edit-toggle');

    // --- Panel controls ---
    leftPanel.querySelector('.panel-close').addEventListener('click', () => leftPanel.classList.remove('open'));
    leftToggle.addEventListener('click', () => leftPanel.classList.toggle('open'));
    rightPanel.querySelector('.panel-close').addEventListener('click', () => rightPanel.classList.remove('open'));

    function openRightPanel(html) {
      panelContent.innerHTML = html;
      rightPanel.classList.add('open');
    }
    function closeRightPanel() { rightPanel.classList.remove('open'); }

    // --- Polly state ---
    const gameState = signal(null);
    const renderData = signal(null);
    const inspectionText = signal(null);

    // --- API ---
    async function playAction(action, target) {
      const body = { action };
      if (target) body.target = target;
      if (gameState.value) body.state = gameState.value;

      const res = await fetch(`${window.BASE_PATH}/api/play`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) { console.error(data.error); return; }

      // Exit edit mode on navigation
      if (editMode.value) {
        editMode.value = false;
        editToggle.textContent = 'Edit';
        editToggle.classList.remove('active');
      }

      gameState.value = data.state;
      renderData.value = null; // force effect to detect change
      renderData.value = data.render;

      if (data.inspection) {
        inspectionText.value = data.inspection;
      }
    }

    async function inspectAction(target) {
      const body = { action: 'inspect', target };
      if (gameState.value) body.state = gameState.value;

      const res = await fetch(`${window.BASE_PATH}/api/play`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (data.error) { console.error(data.error); return; }

      gameState.value = data.state;
      // Don't update renderData — stay on current passage
      if (data.inspection) {
        openRightPanel('<div class="passage" style="animation:none;">' + data.inspection + '</div>');
      }
      // Update memory palace with new state
      renderMemoryPalace(data.render.memory);
    }

    // --- Restart ---
    document.getElementById('restart-btn').addEventListener('click', async () => {
      leftPanel.classList.remove('open');
      await playAction('init');
    });

    function esc(t) { return (t ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    // --- Memory palace renderer ---
    function renderMemoryPalace(memory) {
      if (!memory) { leftPanelContent.innerHTML = ''; return; }
      let html = '';

      // Bracer — clickable, opens inspection in right panel
      html += '<div class="memory-section"><h3>The Bracer</h3>';
      html += '<a href="#" class="memory-link" data-memory-inspect="011">';
      if (memory.engravings.length === 0) {
        html += 'Empty channels. Waiting.';
      } else {
        html += 'Engravings: ' + memory.engravings.map(e => esc(e)).join(', ');
      }
      html += '</a></div>';

      // Litanies — clickable, expands full text in right panel
      html += '<div class="memory-section"><h3>Litanies</h3>';
      if (memory.litanies.length === 0) {
        html += '<ul><li class="empty">None found.</li></ul>';
      } else {
        html += '<ul>' + memory.litanies.map(l =>
          '<li><a href="#" class="memory-link" data-memory-inspect="040"><em>' + esc(l.excerpt) + '</em></a></li>'
        ).join('') + '</ul>';
      }
      html += '</div>';

      // Places
      html += '<div class="memory-section"><h3>Places</h3>';
      if (memory.places.length === 0) {
        html += '<ul><li class="empty">Nowhere yet.</li></ul>';
      } else {
        html += '<ul>' + memory.places.map(p => '<li>' + esc(p) + '</li>').join('') + '</ul>';
      }
      html += '</div>';

      leftPanelContent.innerHTML = html;

      // Bind memory links
      leftPanelContent.querySelectorAll('a[data-memory-inspect]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          inspectAction(a.dataset.memoryInspect);
        });
      });
    }

    // --- Edit mode ---
    const editMode = signal(false);
    let editContexts = {};   // { body: "text...", preamble: "text...", ... }
    let editActiveCtx = 'body';
    let editDirty = false;

    editToggle.addEventListener('click', async () => {
      if (editMode.value) {
        exitEditMode();
      } else {
        await enterEditMode();
      }
    });

    async function enterEditMode() {
      const gs = gameState.value;
      if (!gs) return;
      const res = await fetch(`${window.BASE_PATH}/api/passage-text/${gs.chapter}/${gs.passage}`);
      editContexts = await res.json();
      const keys = Object.keys(editContexts);
      if (keys.length === 0) return;
      editActiveCtx = keys.includes('body') ? 'body' : keys[0];
      editDirty = false;
      editMode.value = true;
      editToggle.textContent = 'View';
      editToggle.classList.add('active');
      renderEditView();
    }

    function exitEditMode() {
      editMode.value = false;
      editToggle.textContent = 'Edit';
      editToggle.classList.remove('active');
      // Re-render current passage
      const rd = renderData.value;
      if (rd) {
        renderData.value = null;
        renderData.value = rd;
      }
    }

    function renderEditView() {
      const gs = gameState.value;
      const rd = renderData.value;
      const keys = Object.keys(editContexts);

      let html = '<div class="edit-bar">';
      // Context tabs (only show if multiple)
      if (keys.length > 1) {
        for (const ctx of keys) {
          const label = ctx.replace('_', ' ');
          html += `<button class="ctx-tab${ctx === editActiveCtx ? ' active' : ''}" data-ctx="${ctx}">${esc(label)}</button>`;
        }
      } else {
        html += `<span style="color:#8a7a6a; font-size:0.85em; letter-spacing:0.06em;">${esc(gs.passage)}</span>`;
      }
      html += '<div class="edit-actions">';
      html += '<button class="save-btn" id="edit-save">Save</button>';
      html += '</div>';
      html += '<span class="edit-status" id="edit-status"></span>';
      html += '</div>';
      html += `<textarea class="edit-area" id="edit-textarea">${esc(editContexts[editActiveCtx] || '')}</textarea>`;

      if (rd) {
        html = (rd.type === 'death' ? '' : '<div class="chapter-title">' + esc(rd.chapterTitle) + '</div>') + html;
      }

      app.innerHTML = html;

      // Bind context tabs
      app.querySelectorAll('.ctx-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          // Save current textarea back before switching
          const ta = document.getElementById('edit-textarea');
          if (ta) editContexts[editActiveCtx] = ta.value;
          editActiveCtx = tab.dataset.ctx;
          renderEditView();
        });
      });

      // Bind save
      document.getElementById('edit-save').addEventListener('click', saveEdit);

      // Track dirty
      const ta = document.getElementById('edit-textarea');
      ta.addEventListener('input', () => { editDirty = true; });

      // Ctrl+S / Cmd+S to save
      ta.addEventListener('keydown', e => {
        if ((e.metaKey || e.ctrlKey) && e.key === 's') {
          e.preventDefault();
          saveEdit();
        }
      });

      ta.focus();
    }

    async function saveEdit() {
      const ta = document.getElementById('edit-textarea');
      const status = document.getElementById('edit-status');
      if (!ta) return;

      // Update local copy
      editContexts[editActiveCtx] = ta.value;

      const gs = gameState.value;
      status.textContent = 'Saving...';

      // Save all dirty contexts
      for (const [ctx, text] of Object.entries(editContexts)) {
        await fetch(`${window.BASE_PATH}/api/passage-text`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chapter: gs.chapter,
            passageId: gs.passage,
            context: ctx,
            text: text,
          }),
        });
      }

      // Refresh render data
      const res = await fetch(`${window.BASE_PATH}/api/play`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'navigate', target: gs.passage, state: gs }),
      });
      const data = await res.json();
      if (!data.error) {
        gameState.value = data.state;
        renderData.value = data.render;
      }

      editDirty = false;
      status.textContent = 'Saved.';
      setTimeout(() => { if (status) status.textContent = ''; }, 1500);
    }

    // --- Bind links after render ---
    function bindLinks() {
      app.querySelectorAll('a[data-navigate]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          closeRightPanel();
          playAction('navigate', a.dataset.navigate);
        });
      });
      app.querySelectorAll('a[data-inspect], a.inline-inspect[data-inspect]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          inspectAction(a.dataset.inspect);
        });
      });
      app.querySelectorAll('a[data-reset]').forEach(a => {
        a.addEventListener('click', e => {
          e.preventDefault();
          closeRightPanel();
          playAction('reset');
        });
      });
    }

    // --- Reactive render ---
    effect(() => {
      const rd = renderData.value;
      if (!rd) return;

      // If in edit mode, re-render edit view (save refreshes renderData)
      if (editMode.value) {
        renderMemoryPalace(rd.memory);
        return;
      }

      let html = '';
      let showEditBtn = false;

      if (rd.type === 'title') {
        html += '<div class="title-page">';
        html += '<h1>The Struggle</h1>';
        html += '<div class="subtitle">' + esc(rd.chapterTitle) + '</div>';
        if (rd.choices.length > 0) {
          html += '<a href="#" data-navigate="' + rd.choices[0].target + '">' + esc(rd.choices[0].label) + '</a>';
        }
        html += '</div>';
        leftToggle.style.display = 'none';
      } else if (rd.type === 'prologue') {
        html += '<div class="passage prologue-text">';
        html += rd.body;
        if (rd.choices.length > 0) {
          html += '<div class="choices"><a href="#" class="nav-link" data-navigate="' + rd.choices[0].target + '">' + esc(rd.choices[0].label) + '</a></div>';
        }
        html += '</div>';
        leftToggle.style.display = 'block';
        showEditBtn = true;
      } else {
        leftToggle.style.display = 'block';
        showEditBtn = true;

        if (rd.type !== 'death') {
          html += '<div class="chapter-title">' + esc(rd.chapterTitle) + '</div>';
        }
        html += '<div class="passage">';
        html += rd.body;

        if (rd.type === 'death') {
          if (rd.deathText) {
            html += '<div class="death-text">';
            html += rd.deathText;
            html += '</div>';
          }
          html += '<div class="death-text">';
          html += '<a href="#" data-reset="true">Begin again.</a>';
          html += '</div>';
        } else if (rd.type === 'end') {
          html += '<div class="separator">&middot; &middot; &middot;</div>';
        } else {
          if (rd.inspections.length > 0) {
            html += '<div class="choices">';
            for (const ins of rd.inspections) {
              html += '<a href="#" class="inspect-link" data-inspect="' + ins.target + '">' + esc(ins.label) + '</a>';
            }
            html += '</div>';
          }
          if (rd.choices.length > 0) {
            html += '<div class="choices">';
            for (const ch of rd.choices) {
              html += '<a href="#" class="nav-link" data-navigate="' + ch.target + '">' + esc(ch.label) + '</a>';
            }
            html += '</div>';
          }
        }

        html += '</div>';
      }

      app.innerHTML = html;
      editToggle.style.display = showEditBtn ? 'block' : 'none';
      window.scrollTo({ top: 0, behavior: 'instant' });
      bindLinks();
      renderMemoryPalace(rd.memory);
    });

    // --- Boot ---
    await playAction('init');
  </script>
</body>
</html>
