<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fairfox</title>
    <style>
      :root {
        color-scheme: light dark;
        --fg: #222;
        --bg: #f7f5ef;
        --accent: #b24b1e;
      }
      @media (prefers-color-scheme: dark) {
        :root { --fg: #e8e4d8; --bg: #1a1816; }
      }
      html, body {
        margin: 0;
        padding: 0;
        font-family: ui-serif, Georgia, serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
      }
      main {
        max-width: 40rem;
        margin: 12vh auto 0;
        padding: 0 2rem;
      }
      h1 {
        font-weight: 400;
        font-size: 3rem;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
      }
      p { font-size: 1.05rem; line-height: 1.6; opacity: 0.85; }
      ul { list-style: none; padding: 0; margin: 2.5rem 0 0; }
      li { margin: 0.4rem 0; }
      a {
        color: var(--accent);
        text-decoration: none;
        font-size: 1.2rem;
        border-bottom: 1px solid transparent;
      }
      a:hover { border-bottom-color: var(--accent); }
    </style>
  </head>
  <body>
    <main>
      <h1>fairfox</h1>
      <p>A small monorepo of things.</p>
      <ul>
        <li><a href="/todo">todo &mdash; project tracker</a></li>
        <li><a href="/struggle">struggle &mdash; interactive sci-fi story</a></li>
      </ul>
    </main>
  </body>
</html>
