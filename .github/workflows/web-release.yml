name: web-release

# Build the fairfox SPA and attach `fairfox-web.zip` to a GitHub
# Release. Triggered on tag push matching `web-v*`. Recommended
# flow:
#
#   git tag web-v0.1.0 && git push origin web-v0.1.0
#
# The Fly fairfox app calls fetchApp() at startup (and on demand via
# `POST /admin/refresh-web-bundle`) to download the asset and serve
# it as the mesh SPA — so UI changes ship without a Fly deploy.

on:
  push:
    tags:
      - "web-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web bundle
        run: bun scripts/build-web-bundle.ts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/fairfox-web.zip
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

      # Wait until GitHub actually surfaces this release before
      # nudging the server. `action-gh-release` returns as soon as
      # the release is created, but the releases list API lags a few
      # seconds behind. The server's fetchApp() reads that same list
      # (newest `web-v*` entry), so a refresh fired too early pulls
      # the *previous* release and the deploy silently serves stale
      # code — observed on two consecutive releases. Poll the list
      # the server reads until its newest `web-v*` entry is this tag.
      - name: Wait for the release to surface on GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_TAG: ${{ github.ref_name }}
        run: |
          for i in $(seq 1 30); do
            latest=$(gh api "repos/${{ github.repository }}/releases" \
              --jq 'map(select(.tag_name | startswith("web-v"))) | .[0].tag_name' \
              2>/dev/null || true)
            echo "attempt $i: newest web-v release = ${latest:-<none>} (want $EXPECTED_TAG)"
            if [ "$latest" = "$EXPECTED_TAG" ]; then
              echo "release $EXPECTED_TAG is live on GitHub"
              exit 0
            fi
            sleep 4
          done
          echo "::error::release $EXPECTED_TAG did not surface on GitHub within ~2min"
          exit 1

      # Nudge the running Fly server to re-fetch the new bundle
      # without a `fly machine restart`. If the GH Actions secret is
      # absent the step warns and continues — that's the only path
      # we treat as recoverable, because it means the operator
      # intentionally hasn't configured server-side refresh and the
      # server will catch up at next cold-start. Any other failure
      # (401, 403, 503, network error) means the refresh pipeline
      # is silently broken — a previous regression where the Fly
      # secret was missing while the GH secret was present went
      # undetected for ~10 web releases because the step swallowed
      # the curl exit status. Fail the workflow loudly so the next
      # such drift gets caught at the tag that introduced it.
      #
      # The refresh response carries the tag the server settled on.
      # Assert it matches this release: if propagation still raced
      # the wait step above, fail loudly here rather than leave the
      # deploy quietly serving the previous bundle.
      - name: Refresh deployed server bundle
        env:
          FAIRFOX_REFRESH_TOKEN: ${{ secrets.FAIRFOX_REFRESH_TOKEN }}
          FAIRFOX_SERVER_URL: ${{ vars.FAIRFOX_SERVER_URL || 'https://fairfox.fly.dev' }}
          EXPECTED_TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$FAIRFOX_REFRESH_TOKEN" ]; then
            echo "::warning::FAIRFOX_REFRESH_TOKEN secret not set — skipping server refresh"
            exit 0
          fi
          response=$(curl -fsS -X POST \
            -H "Authorization: Bearer $FAIRFOX_REFRESH_TOKEN" \
            "$FAIRFOX_SERVER_URL/admin/refresh-web-bundle")
          echo "refresh response: $response"
          served=$(printf '%s' "$response" | jq -r '.tag')
          if [ "$served" != "$EXPECTED_TAG" ]; then
            echo "::error::server refreshed to '$served', expected '$EXPECTED_TAG' — GitHub release propagation raced the refresh"
            exit 1
          fi
          echo "server is now serving $served"
