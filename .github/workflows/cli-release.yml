name: cli-release

# Build the fairfox CLI bundle and attach it to a GitHub Release.
# Triggers on a tag push matching v*. Recommended flow:
#
#   git tag v0.1.0 && git push --tags
#
# The attached asset is the single file `fairfox.js` at the root of
# the release; `fairfox update` fetches it via
# https://github.com/AlexJeffcott/fairfox/releases/latest/download/fairfox.js
# so Railway doesn't need to be touched for a CLI-only change.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI bundle
        env:
          FAIRFOX_CLI_VERSION: ${{ github.ref_name }}
        run: bun run --cwd packages/cli build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/cli/dist/fairfox.js
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
